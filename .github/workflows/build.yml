name: Build KAIRO

on:
  push:
    tags:
      - 'v*'          # triggers on v2.0.0, v2.1.0, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build:
    permissions:
      contents: write   # required so tauri-action can create the GitHub release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Universal binary — runs native on Intel AND Apple Silicon
            args: '--target universal-apple-darwin'
            node-triple: 'universal-apple-darwin'
          - platform: windows-latest
            args: ''
            node-triple: 'x86_64-pc-windows-msvc'
          - platform: ubuntu-22.04
            # Skip AppImage — linuxdeploy is currently broken on
            # ubuntu-22.04 + libwebkit2gtk-4.1. .deb and .rpm cover
            # the vast majority of Linux desktops.
            args: '--bundles deb,rpm,updater'
            node-triple: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js (for server deps) ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Install server dependencies ────────────────────────────────────
      - name: Install server dependencies
        working-directory: server
        run: npm ci --omit=dev

      # ── Mirror vosk-koffi native lib for the universal Mac build ──────
      # The upstream vosk-osx zip is a universal binary (x86_64 + arm64),
      # but the postinstall only creates bin-darwin-${process.arch} for the
      # CI runner's arch. We need both directory names so Intel + Apple
      # Silicon users both resolve at runtime.
      - name: Mirror vosk-koffi bin dir for both Mac arches
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          ARM="server/node_modules/vosk-koffi/bin-darwin-arm64"
          X64="server/node_modules/vosk-koffi/bin-darwin-x64"
          if [ -d "$ARM" ] && [ ! -d "$X64" ]; then
            cp -R "$ARM" "$X64"
            echo "✓ mirrored $ARM → $X64"
          elif [ -d "$X64" ] && [ ! -d "$ARM" ]; then
            cp -R "$X64" "$ARM"
            echo "✓ mirrored $X64 → $ARM"
          fi

      # ── Download Vosk model (offline speech engine) ────────────────────
      # Bundled into the .app/.msi/.deb so the Offline mode works on first
      # launch without any network round-trip. ~40MB compressed → ~68MB extracted.
      - name: Download Vosk model (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          set -euo pipefail
          MODEL_DIR="server/models/vosk-en"
          if [ -d "$MODEL_DIR" ] && [ -f "$MODEL_DIR/conf/model.conf" ]; then
            echo "Vosk model already present, skipping download"
          else
            mkdir -p server/models
            cd server/models
            curl -fsSL -o vosk-en.zip "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip"
            unzip -q vosk-en.zip
            rm vosk-en.zip
            mv vosk-model-small-en-us-0.15 vosk-en
            echo "✓ Vosk model installed at $MODEL_DIR"
          fi

      - name: Download Vosk model (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $MODEL_DIR = "server\models\vosk-en"
          if (Test-Path "$MODEL_DIR\conf\model.conf") {
            Write-Host "Vosk model already present, skipping download"
          } else {
            New-Item -ItemType Directory -Force -Path "server\models" | Out-Null
            Invoke-WebRequest -Uri "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip" -OutFile "server\models\vosk-en.zip"
            Expand-Archive -Path "server\models\vosk-en.zip" -DestinationPath "server\models"
            Remove-Item "server\models\vosk-en.zip"
            Rename-Item "server\models\vosk-model-small-en-us-0.15" "vosk-en"
            Write-Host "✓ Vosk model installed at $MODEL_DIR"
          }

      # ── Rust ───────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal needs both targets so Tauri can lipo them into a fat binary
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Linux system deps ──────────────────────────────────────────────
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Download bundled Node.js binary for this platform ─────────────
      # macOS universal-apple-darwin: download BOTH arm64 + x64 node binaries.
      # Tauri's sidecar pipeline uses `lipo` to combine them into a fat binary.
      - name: Download Node.js binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          set -euo pipefail
          NODE_VERSION="22.14.0"
          TRIPLE="${{ matrix.node-triple }}"
          DEST="src-tauri/bin"
          mkdir -p "$DEST"

          fetch_node() {
            local os="$1" nodearch="$2" triple="$3"
            local url="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-${os}-${nodearch}.tar.gz"
            local subdir="node-v${NODE_VERSION}-${os}-${nodearch}/bin/node"
            local tmp="node-${triple}.tar.gz"
            curl -fsSL "$url" -o "$tmp"
            tar -xzf "$tmp"
            cp "$subdir" "$DEST/node-${triple}"
            chmod +x "$DEST/node-${triple}"
            echo "✓ Bundled $DEST/node-${triple}"
          }

          if [[ "$TRIPLE" == "universal-apple-darwin" ]]; then
            fetch_node darwin arm64 aarch64-apple-darwin
            fetch_node darwin x64   x86_64-apple-darwin
            # Tauri's sidecar loader for universal-apple-darwin expects ONE
            # file named node-universal-apple-darwin. Fuse the two arch
            # binaries into a fat Mach-O with lipo.
            lipo -create \
              "$DEST/node-aarch64-apple-darwin" \
              "$DEST/node-x86_64-apple-darwin" \
              -output "$DEST/node-universal-apple-darwin"
            chmod +x "$DEST/node-universal-apple-darwin"
            lipo -info "$DEST/node-universal-apple-darwin"
            echo "✓ Bundled universal $DEST/node-universal-apple-darwin"
          elif [[ "$TRIPLE" == *"darwin"* ]]; then
            ARCH=$(echo "$TRIPLE" | grep -o 'aarch64\|x86_64')
            NODEARCH=$([ "$ARCH" = "aarch64" ] && echo "arm64" || echo "x64")
            fetch_node darwin "$NODEARCH" "$TRIPLE"
          else
            fetch_node linux x64 "$TRIPLE"
          fi

      - name: Download Node.js binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $NODE_VERSION = "22.14.0"
          $DEST = "src-tauri\bin"
          New-Item -ItemType Directory -Force -Path $DEST
          $URL = "https://nodejs.org/dist/v$NODE_VERSION/node-v$NODE_VERSION-win-x64.zip"
          Invoke-WebRequest -Uri $URL -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath .
          Copy-Item "node-v$NODE_VERSION-win-x64\node.exe" "$DEST\node-x86_64-pc-windows-msvc.exe"
          Write-Host "✓ Bundled $DEST\node-x86_64-pc-windows-msvc.exe"

      # ── Build KAIRO with Tauri ─────────────────────────────────────────
      # Note: macOS builds use ad-hoc signing (APPLE_SIGNING_IDENTITY: '-').
      # Users will need to right-click → Open on first launch.
      # To enable proper Developer ID signing + notarization, restore the
      # APPLE_CERTIFICATE / APPLE_ID / APPLE_TEAM_ID secrets and pass them here.
      - name: Build KAIRO
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Updater signing (required for auto-update to work) ──────────
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ── macOS ad-hoc signing only (no Developer ID required) ───────
          APPLE_SIGNING_IDENTITY: '-'

          # ── Linux AppImage workaround ──────────────────────────────────
          # Ubuntu 22.04 + libwebkit2gtk 4.1 trips linuxdeploy's strip pass.
          NO_STRIP: 'true'
        with:
          tagName:     ${{ github.ref_name }}
          releaseName: 'KAIRO ${{ github.ref_name }}'
          releaseBody: |
            ## KAIRO ${{ github.ref_name }}

            **AI-powered live Bible verse detection for church services.**

            ### What's new
            - **Native NDI sender** — KAIRO now appears directly on the network as an NDI source. Frames are rendered in pure Rust (tiny-skia + cosmic-text) and sent without any capture bridge. Settings → Outputs → NDI → toggle on. Requires [NDI Tools](https://ndi.video/tools/) (free) installed; KAIRO loads `libndi` from the standard install paths at runtime.
            - **3 new lower-third layout variants** — `lower-third-card` (bottom-left offset card), `corner-card` (compact upper-right pop-in), `side-rail` (full-height left rail). Each comes with a matching theme preset.
            - **No more white splash flash** — splash window now starts with the dark gradient already painted; main window also uses a dark base color so transitions are seamless.

            ### Carried over from v2.2.2
            - 5 lower-third theme presets (Broadcast, Ribbon, Bold Title, Whisper, Brand Block)
            - Syphon setup parity with ProPresenter
            - "Open Settings" banner fix

            ### Carried over from v2.2.1
            - **macOS launch fix** — bundled Node sidecar ships with JIT entitlements (was the v2.2.0 white-screen cause).
            - **Branded loading splash** — instant feedback while the server boots.
            - **Microphone permission prompt** — proper macOS dialog with a usage description.
            - **Offline speech engine** — runs entirely on-device. No internet, no API key, no monthly cost. Powered by Vosk.
            - **Pill Start/Stop button** — outlined when idle, filled while listening.

            ### Pick your engine in Settings → Audio
            - **Deepgram** — higher accuracy, requires a free API key from [deepgram.com](https://deepgram.com) (12,000 min/month free).
            - **Offline** — no internet, no key, runs locally. Lower accuracy but always-on.

            ### Install

            - **macOS**: Download `.dmg`, drag KAIRO to Applications.

              **First launch only**: macOS will block the app because we don't yet have an Apple Developer signing certificate. Right-click KAIRO in Applications → **Open** → click **Open** in the dialog. After that, double-click works normally.

            - **Windows**: Download `.msi` installer, run it. SmartScreen may show "unrecognized publisher" — click **More info** → **Run anyway**.

            - **Linux**: Download `.deb` (Debian/Ubuntu) or `.rpm` (Fedora/RHEL).

            ### Optional integrations
            ProPresenter REST API · OBS WebSocket · Syphon / external display (macOS)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Deploy landing page to GitHub Pages ─────────────────────────────────
  deploy-page:
    needs: build
    # Skip when triggered by a tag (github-pages environment only allows
    # deployments from protected branches, not tags). Pages re-deploys
    # automatically on any push to main.
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
